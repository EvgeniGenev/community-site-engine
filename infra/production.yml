AWSTemplateFormatVersion: "2010-09-09"
Description: Production AWS infrastructure for Community Site Engine, including admin app, static site, and CodeBuild publishing pipeline.

Parameters:
  ProjectName:
    Type: String
    Default: s3cms
  CmsContentBucketName:
    Type: String
    Description: Globally unique private S3 bucket for CMS JSON/media content.
  PublicSiteBucketName:
    Type: String
    Description: Globally unique private S3 bucket for the public static site origin.
  AdminSiteBucketName:
    Type: String
    Description: Globally unique private S3 bucket for the admin app origin.
  ApiLambdaCodeS3Bucket:
    Type: String
    Description: S3 bucket containing the packaged CMS API Lambda zip.
  ApiLambdaCodeS3Key:
    Type: String
    Description: S3 key for the packaged CMS API Lambda zip.
  CodeBuildSourceLocation:
    Type: String
    Description: HTTPS repository URL for CodeBuild, for example https://github.com/ORG/REPO.git.
  CodeBuildSourceVersion:
    Type: String
    Default: main
    Description: Branch, tag, or commit for CodeBuild to build.
  CmsContentPrefix:
    Type: String
    Default: ""
    Description: Optional prefix inside the CMS content bucket. Leave blank when content is at bucket root.
  AdminAllowedOrigins:
    Type: String
    Description: Comma-separated admin app origins allowed by the CMS API CORS policy, for example https://admin.example.com.
  CognitoCallbackUrls:
    Type: CommaDelimitedList
    Default: "http://localhost:5174"
    Description: Cognito app client callback URLs. Update if/when a hosted UI login is added.
  CognitoLogoutUrls:
    Type: CommaDelimitedList
    Default: "http://localhost:5174"
    Description: Cognito app client logout URLs. Update if/when a hosted UI login is added.
  MaxMediaBytes:
    Type: Number
    Default: 10485760
  CodeBuildQueuedTimeoutMinutes:
    Type: Number
    Default: 30
  PriceClass:
    Type: String
    Default: PriceClass_100
    AllowedValues:
      - PriceClass_100
      - PriceClass_200
      - PriceClass_All

Resources:
  CmsContentBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref CmsContentBucketName
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  PublicSiteBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref PublicSiteBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  AdminSiteBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref AdminSiteBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  SiteOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub ${ProjectName}-site-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  AdminOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub ${ProjectName}-admin-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  SiteDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub ${ProjectName} public static site
        DefaultRootObject: index.html
        PriceClass: !Ref PriceClass
        HttpVersion: http2and3
        Origins:
          - Id: site-origin
            DomainName: !GetAtt PublicSiteBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt SiteOriginAccessControl.Id
        DefaultCacheBehavior:
          TargetOriginId: site-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD, OPTIONS]
          Compress: true
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 404
            ResponsePagePath: /404.html
          - ErrorCode: 404
            ResponseCode: 404
            ResponsePagePath: /404.html

  AdminDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub ${ProjectName} CMS admin app
        DefaultRootObject: index.html
        PriceClass: !Ref PriceClass
        HttpVersion: http2and3
        Origins:
          - Id: admin-origin
            DomainName: !GetAtt AdminSiteBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt AdminOriginAccessControl.Id
        DefaultCacheBehavior:
          TargetOriginId: admin-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD, OPTIONS]
          Compress: true
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

  PublicSiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref PublicSiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${PublicSiteBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${SiteDistribution}

  AdminSiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AdminSiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${AdminSiteBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${AdminDistribution}

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub ${ProjectName}-cms-users
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Schema:
        - Name: role
          AttributeDataType: String
          Mutable: true
          Required: false
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub ${ProjectName}-cms-admin-client
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
      SupportedIdentityProviders:
        - COGNITO
      CallbackURLs: !Ref CognitoCallbackUrls
      LogoutURLs: !Ref CognitoLogoutUrls
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - email
        - openid
        - profile

  ApiLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: cms-api-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !GetAtt CmsContentBucket.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub ${CmsContentBucket.Arn}/*
              - Effect: Allow
                Action:
                  - cognito-idp:AdminCreateUser
                  - cognito-idp:AdminDeleteUser
                  - cognito-idp:AdminSetUserPassword
                  - cognito-idp:AdminUpdateUserAttributes
                  - cognito-idp:ListUsers
                Resource: !GetAtt UserPool.Arn
              - Effect: Allow
                Action:
                  - codebuild:StartBuild
                Resource: !GetAtt StaticSiteBuildProject.Arn

  ApiLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-cms-api
      Runtime: nodejs22.x
      Handler: lambda.handler
      Role: !GetAtt ApiLambdaRole.Arn
      Timeout: 30
      MemorySize: 512
      Code:
        S3Bucket: !Ref ApiLambdaCodeS3Bucket
        S3Key: !Ref ApiLambdaCodeS3Key
      Environment:
        Variables:
          STORAGE_MODE: s3
          CMS_CONTENT_BUCKET: !Ref CmsContentBucket
          CMS_CONTENT_PREFIX: !Ref CmsContentPrefix
          COGNITO_USER_POOL_ID: !Ref UserPool
          COGNITO_REGION: !Ref AWS::Region
          COGNITO_APP_CLIENT_ID: !Ref UserPoolClient
          ADMIN_ALLOWED_ORIGINS: !Ref AdminAllowedOrigins
          CMS_ALLOW_DEV_TOKENS: "false"
          MAX_MEDIA_BYTES: !Ref MaxMediaBytes
          CODEBUILD_PROJECT_NAME: !Ref StaticSiteBuildProject
          CODEBUILD_QUEUED_TIMEOUT_MINUTES: !Ref CodeBuildQueuedTimeoutMinutes

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub ${ProjectName}-cms-api
      ProtocolType: HTTP

  HttpApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ApiLambda.Arn
      PayloadFormatVersion: "2.0"

  HttpApiDefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: $default
      Target: !Sub integrations/${HttpApiIntegration}

  HttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: $default
      AutoDeploy: true

  ApiLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ApiLambda
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/*

  CodeBuildServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: static-site-build
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${ProjectName}-static-site-build
                  - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${ProjectName}-static-site-build:*
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource:
                  - !GetAtt CmsContentBucket.Arn
                  - !GetAtt PublicSiteBucket.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub ${CmsContentBucket.Arn}/*
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub ${PublicSiteBucket.Arn}/*
              - Effect: Allow
                Action:
                  - cloudfront:CreateInvalidation
                Resource: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${SiteDistribution}

  StaticSiteBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub ${ProjectName}-static-site-build
      Description: Build and deploy the Astro static site from CMS content in S3.
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      ConcurrentBuildLimit: 1
      QueuedTimeoutInMinutes: !Ref CodeBuildQueuedTimeoutMinutes
      Artifacts:
        Type: NO_ARTIFACTS
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        PrivilegedMode: false
        EnvironmentVariables:
          - Name: CMS_CONTENT_BUCKET
            Type: PLAINTEXT
            Value: !Ref CmsContentBucket
          - Name: CMS_CONTENT_PREFIX
            Type: PLAINTEXT
            Value: !Ref CmsContentPrefix
          - Name: PUBLIC_SITE_BUCKET
            Type: PLAINTEXT
            Value: !Ref PublicSiteBucket
          - Name: CLOUDFRONT_DISTRIBUTION_ID
            Type: PLAINTEXT
            Value: !Ref SiteDistribution
      Source:
        Type: GITHUB
        Location: !Ref CodeBuildSourceLocation
        BuildSpec: buildspec.yml
      SourceVersion: !Ref CodeBuildSourceVersion
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED

Outputs:
  CmsContentBucket:
    Value: !Ref CmsContentBucket
  PublicSiteBucket:
    Value: !Ref PublicSiteBucket
  AdminSiteBucket:
    Value: !Ref AdminSiteBucket
  PublicSiteCloudFrontDomain:
    Value: !GetAtt SiteDistribution.DomainName
  AdminCloudFrontDomain:
    Value: !GetAtt AdminDistribution.DomainName
  ApiEndpoint:
    Value: !GetAtt HttpApi.ApiEndpoint
  CognitoUserPoolId:
    Value: !Ref UserPool
  CognitoAppClientId:
    Value: !Ref UserPoolClient
  CodeBuildProjectName:
    Value: !Ref StaticSiteBuildProject
