AWSTemplateFormatVersion: "2010-09-09"
Description: Single-template production deployment for Community Site Engine.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Site
        Parameters:
          - SiteName
          - AdminEmail
          - AssetsZipS3Uri
    ParameterLabels:
      SiteName:
        default: Site name
      AssetsZipS3Uri:
        default: Optional assets zip S3 URI
      AdminEmail:
        default: Initial admin email

Parameters:
  SiteName:
    Type: String
    Description: Short lowercase site name used as the prefix for every named AWS resource.
    MinLength: 2
    MaxLength: 16
    AllowedPattern: "^[a-z][a-z0-9-]*[a-z0-9]$"
    ConstraintDescription: Use 2-16 lowercase letters, numbers, and hyphens. Start with a letter and end with a letter or number.
  AssetsZipS3Uri:
    Type: String
    Default: ""
    Description: Optional s3://bucket/key.zip containing site content/assets. The zip may contain content/... or site-assets/content/... paths.
    AllowedPattern: "^$|^s3://[^/]+/.+\\.zip$"
    ConstraintDescription: Leave blank or provide an s3://bucket/key.zip URI.
  AdminEmail:
    Type: String
    Description: Email address for the first Cognito admin user. Cognito sends this user a temporary password.
    AllowedPattern: "^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$"
    ConstraintDescription: Provide a valid email address.

Conditions:
  HasAssetsZip: !Not [!Equals [!Ref AssetsZipS3Uri, ""]]

Resources:
  CmsContentBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub ${SiteName}-content-${AWS::Region}-${AWS::AccountId}
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Name
          Value: !Sub ${SiteName}-content-${AWS::Region}-${AWS::AccountId}

  PublicSiteBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub ${SiteName}-public-${AWS::Region}-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Name
          Value: !Sub ${SiteName}-public-${AWS::Region}-${AWS::AccountId}

  AdminSiteBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub ${SiteName}-admin-${AWS::Region}-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Name
          Value: !Sub ${SiteName}-admin-${AWS::Region}-${AWS::AccountId}

  SiteOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub ${SiteName}-site-oac-${AWS::Region}-${AWS::AccountId}
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  AdminOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub ${SiteName}-admin-oac-${AWS::Region}-${AWS::AccountId}
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  SiteDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub ${SiteName}-site-cdn-${AWS::Region}-${AWS::AccountId}
        DefaultRootObject: index.html
        PriceClass: PriceClass_100
        HttpVersion: http2and3
        Origins:
          - Id: site-origin
            DomainName: !GetAtt PublicSiteBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt SiteOriginAccessControl.Id
        DefaultCacheBehavior:
          TargetOriginId: site-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD, OPTIONS]
          Compress: true
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 404
            ResponsePagePath: /404.html
          - ErrorCode: 404
            ResponseCode: 404
            ResponsePagePath: /404.html
      Tags:
        - Key: Name
          Value: !Sub ${SiteName}-site-cdn-${AWS::Region}-${AWS::AccountId}

  AdminDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub ${SiteName}-admin-cdn-${AWS::Region}-${AWS::AccountId}
        DefaultRootObject: index.html
        PriceClass: PriceClass_100
        HttpVersion: http2and3
        Origins:
          - Id: admin-origin
            DomainName: !GetAtt AdminSiteBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt AdminOriginAccessControl.Id
        DefaultCacheBehavior:
          TargetOriginId: admin-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD, OPTIONS]
          Compress: true
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
      Tags:
        - Key: Name
          Value: !Sub ${SiteName}-admin-cdn-${AWS::Region}-${AWS::AccountId}

  PublicSiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref PublicSiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${PublicSiteBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${SiteDistribution}

  AdminSiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AdminSiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${AdminSiteBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${AdminDistribution}

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub ${SiteName}-users-${AWS::Region}-${AWS::AccountId}
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Schema:
        - Name: role
          AttributeDataType: String
          Mutable: true
          Required: false
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      UserPoolTags:
        Name: !Sub ${SiteName}-users-${AWS::Region}-${AWS::AccountId}

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub ${SiteName}-admin-client-${AWS::Region}-${AWS::AccountId}
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
      SupportedIdentityProviders:
        - COGNITO
      CallbackURLs:
        - !Sub https://${AdminDistribution.DomainName}
      LogoutURLs:
        - !Sub https://${AdminDistribution.DomainName}
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - email
        - openid
        - profile

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub ${SiteName}-auth-${AWS::Region}-${AWS::AccountId}
      UserPoolId: !Ref UserPool

  InitialAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${SiteName}-initial-admin-role-${AWS::Region}-${AWS::AccountId}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: !Sub ${SiteName}-initial-admin-access-${AWS::Region}-${AWS::AccountId}
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:AdminCreateUser
                  - cognito-idp:AdminGetUser
                  - cognito-idp:AdminUpdateUserAttributes
                Resource: !GetAtt UserPool.Arn

  InitialAdminFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${SiteName}-initial-admin-${AWS::Region}-${AWS::AccountId}
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt InitialAdminRole.Arn
      Timeout: 120
      MemorySize: 256
      Code:
        ZipFile: |
          import boto3
          import json
          import urllib.request

          cognito = boto3.client("cognito-idp")

          def respond(event, context, status, data=None, reason=None):
              body = {
                  "Status": status,
                  "Reason": reason or f"See CloudWatch Log Stream: {context.log_stream_name}",
                  "PhysicalResourceId": event.get("PhysicalResourceId") or f"initial-admin-{event['ResourceProperties']['AdminEmail']}",
                  "StackId": event["StackId"],
                  "RequestId": event["RequestId"],
                  "LogicalResourceId": event["LogicalResourceId"],
                  "NoEcho": False,
                  "Data": data or {},
              }
              payload = json.dumps(body).encode("utf-8")
              req = urllib.request.Request(event["ResponseURL"], data=payload, method="PUT")
              req.add_header("content-type", "")
              req.add_header("content-length", str(len(payload)))
              urllib.request.urlopen(req, timeout=30)

          def upsert_admin(user_pool_id, email):
              attributes = [
                  {"Name": "email", "Value": email},
                  {"Name": "email_verified", "Value": "true"},
                  {"Name": "name", "Value": "Initial Admin"},
                  {"Name": "custom:role", "Value": "admin"},
              ]
              try:
                  cognito.admin_create_user(
                      UserPoolId=user_pool_id,
                      Username=email,
                      UserAttributes=attributes,
                      DesiredDeliveryMediums=["EMAIL"],
                  )
                  return "created"
              except cognito.exceptions.UsernameExistsException:
                  cognito.admin_update_user_attributes(
                      UserPoolId=user_pool_id,
                      Username=email,
                      UserAttributes=attributes,
                  )
                  return "updated"

          def handler(event, context):
              try:
                  if event["RequestType"] == "Delete":
                      respond(event, context, "SUCCESS", {"Skipped": "Delete does not remove Cognito users"})
                      return
                  props = event["ResourceProperties"]
                  status = upsert_admin(props["UserPoolId"], props["AdminEmail"])
                  respond(event, context, "SUCCESS", {"AdminEmail": props["AdminEmail"], "Status": status})
              except Exception as exc:
                  respond(event, context, "FAILED", reason=str(exc))

  InitialAdminUser:
    Type: Custom::InitialAdminUser
    DependsOn:
      - UserPool
      - InitialAdminFunction
    Properties:
      ServiceToken: !GetAtt InitialAdminFunction.Arn
      UserPoolId: !Ref UserPool
      AdminEmail: !Ref AdminEmail

  ApiLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${SiteName}-api-role-${AWS::Region}-${AWS::AccountId}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: !Sub ${SiteName}-api-access-${AWS::Region}-${AWS::AccountId}
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !GetAtt CmsContentBucket.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub ${CmsContentBucket.Arn}/*
              - Effect: Allow
                Action:
                  - cognito-idp:AdminCreateUser
                  - cognito-idp:AdminDeleteUser
                  - cognito-idp:AdminSetUserPassword
                  - cognito-idp:AdminUpdateUserAttributes
                  - cognito-idp:ListUsers
                Resource: !GetAtt UserPool.Arn
              - Effect: Allow
                Action:
                  - codebuild:StartBuild
                Resource: !Sub arn:aws:codebuild:${AWS::Region}:${AWS::AccountId}:project/${SiteName}-build-${AWS::Region}-${AWS::AccountId}

  ApiLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${SiteName}-api-${AWS::Region}-${AWS::AccountId}
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt ApiLambdaRole.Arn
      Timeout: 30
      MemorySize: 512
      Code:
        ZipFile: |
          exports.handler = async () => ({
            statusCode: 503,
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ error: "CMS API package has not been deployed yet." })
          });
      Environment:
        Variables:
          STORAGE_MODE: s3
          CMS_CONTENT_BUCKET: !Ref CmsContentBucket
          CMS_CONTENT_PREFIX: ""
          COGNITO_USER_POOL_ID: !Ref UserPool
          COGNITO_REGION: !Ref AWS::Region
          COGNITO_APP_CLIENT_ID: !Ref UserPoolClient
          ADMIN_ALLOWED_ORIGINS: !Sub https://${AdminDistribution.DomainName}
          CMS_ALLOW_DEV_TOKENS: "false"
          MAX_MEDIA_BYTES: "10485760"
          CODEBUILD_PROJECT_NAME: !Sub ${SiteName}-build-${AWS::Region}-${AWS::AccountId}
          CODEBUILD_QUEUED_TIMEOUT_MINUTES: "30"

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub ${SiteName}-http-api-${AWS::Region}-${AWS::AccountId}
      ProtocolType: HTTP

  HttpApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ApiLambda.Arn
      PayloadFormatVersion: "2.0"

  HttpApiDefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: $default
      Target: !Sub integrations/${HttpApiIntegration}

  HttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: $default
      AutoDeploy: true

  ApiLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ApiLambda
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/*

  AssetSeederRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${SiteName}-asset-seeder-role-${AWS::Region}-${AWS::AccountId}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: !Sub ${SiteName}-asset-seeder-access-${AWS::Region}-${AWS::AccountId}
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: "*"
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt CmsContentBucket.Arn
                  - !Sub ${CmsContentBucket.Arn}/*

  AssetSeederFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${SiteName}-asset-seeder-${AWS::Region}-${AWS::AccountId}
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt AssetSeederRole.Arn
      Timeout: 900
      MemorySize: 1024
      Code:
        ZipFile: |
          import boto3
          import io
          import json
          import re
          import urllib.request
          import zipfile

          s3 = boto3.client("s3")

          def respond(event, context, status, data=None, reason=None):
              body = {
                  "Status": status,
                  "Reason": reason or f"See CloudWatch Log Stream: {context.log_stream_name}",
                  "PhysicalResourceId": event.get("PhysicalResourceId") or "asset-seed",
                  "StackId": event["StackId"],
                  "RequestId": event["RequestId"],
                  "LogicalResourceId": event["LogicalResourceId"],
                  "NoEcho": False,
                  "Data": data or {},
              }
              payload = json.dumps(body).encode("utf-8")
              req = urllib.request.Request(event["ResponseURL"], data=payload, method="PUT")
              req.add_header("content-type", "")
              req.add_header("content-length", str(len(payload)))
              urllib.request.urlopen(req, timeout=30)

          def normalize_key(name):
              name = name.replace("\\", "/").lstrip("/")
              for prefix in ("site-assets/content/", "content/"):
                  if name.startswith(prefix):
                      return name[len(prefix):]
              return name

          def handler(event, context):
              try:
                  if event["RequestType"] == "Delete":
                      respond(event, context, "SUCCESS", {"Skipped": "Delete does not remove content"})
                      return
                  props = event["ResourceProperties"]
                  uri = props["AssetsZipS3Uri"]
                  if not uri:
                      respond(event, context, "SUCCESS", {"Skipped": "No assets zip provided"})
                      return
                  dest_bucket = props["DestinationBucket"]
                  match = re.match(r"^s3://([^/]+)/(.+)$", uri)
                  if not match:
                      raise ValueError("AssetsZipS3Uri must be an s3://bucket/key.zip URI")
                  source_bucket, source_key = match.groups()
                  obj = s3.get_object(Bucket=source_bucket, Key=source_key)
                  data = obj["Body"].read()
                  uploaded = 0
                  with zipfile.ZipFile(io.BytesIO(data)) as archive:
                      for info in archive.infolist():
                          if info.is_dir():
                              continue
                          key = normalize_key(info.filename)
                          if not key or key.startswith("../") or "/../" in key:
                              continue
                          s3.put_object(Bucket=dest_bucket, Key=key, Body=archive.read(info))
                          uploaded += 1
                  respond(event, context, "SUCCESS", {"UploadedFiles": uploaded})
              except Exception as exc:
                  respond(event, context, "FAILED", reason=str(exc))

  AssetSeed:
    Type: Custom::AssetSeed
    DependsOn:
      - CmsContentBucket
      - AssetSeederFunction
    Properties:
      ServiceToken: !GetAtt AssetSeederFunction.Arn
      AssetsZipS3Uri: !Ref AssetsZipS3Uri
      DestinationBucket: !Ref CmsContentBucket

  CodeBuildServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${SiteName}-build-role-${AWS::Region}-${AWS::AccountId}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub ${SiteName}-build-access-${AWS::Region}-${AWS::AccountId}
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${SiteName}-build-${AWS::Region}-${AWS::AccountId}
                  - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${SiteName}-build-${AWS::Region}-${AWS::AccountId}:*
              - Effect: Allow
                Action:
                  - s3:GetBucketLocation
                  - s3:ListBucket
                Resource:
                  - !GetAtt CmsContentBucket.Arn
                  - !GetAtt PublicSiteBucket.Arn
                  - !GetAtt AdminSiteBucket.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource:
                  - !Sub ${CmsContentBucket.Arn}/*
                  - !Sub ${PublicSiteBucket.Arn}/*
                  - !Sub ${AdminSiteBucket.Arn}/*
              - Effect: Allow
                Action:
                  - cloudfront:CreateInvalidation
                Resource:
                  - !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${SiteDistribution}
                  - !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${AdminDistribution}
              - Effect: Allow
                Action:
                  - lambda:GetFunctionConfiguration
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                Resource: !GetAtt ApiLambda.Arn

  StaticSiteBuildProject:
    Type: AWS::CodeBuild::Project
    DependsOn:
      - PublicSiteBucketPolicy
      - AdminSiteBucketPolicy
      - ApiLambda
      - HttpApiStage
    Properties:
      Name: !Sub ${SiteName}-build-${AWS::Region}-${AWS::AccountId}
      Description: !Sub ${SiteName}-build-${AWS::Region}-${AWS::AccountId}
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      ConcurrentBuildLimit: 1
      QueuedTimeoutInMinutes: 30
      Artifacts:
        Type: NO_ARTIFACTS
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        PrivilegedMode: false
        EnvironmentVariables:
          - Name: REPOSITORY_URL
            Type: PLAINTEXT
            Value: https://github.com/EvgeniGenev/community-site-engine.git
          - Name: SOURCE_VERSION
            Type: PLAINTEXT
            Value: main
          - Name: CMS_CONTENT_BUCKET
            Type: PLAINTEXT
            Value: !Ref CmsContentBucket
          - Name: PUBLIC_SITE_BUCKET
            Type: PLAINTEXT
            Value: !Ref PublicSiteBucket
          - Name: ADMIN_SITE_BUCKET
            Type: PLAINTEXT
            Value: !Ref AdminSiteBucket
          - Name: SITE_DISTRIBUTION_ID
            Type: PLAINTEXT
            Value: !Ref SiteDistribution
          - Name: ADMIN_DISTRIBUTION_ID
            Type: PLAINTEXT
            Value: !Ref AdminDistribution
          - Name: CMS_API_FUNCTION_NAME
            Type: PLAINTEXT
            Value: !Ref ApiLambda
          - Name: CMS_API_ENDPOINT
            Type: PLAINTEXT
            Value: !GetAtt HttpApi.ApiEndpoint
          - Name: COGNITO_DOMAIN
            Type: PLAINTEXT
            Value: !Sub https://${UserPoolDomain}.auth.${AWS::Region}.amazoncognito.com
          - Name: COGNITO_CLIENT_ID
            Type: PLAINTEXT
            Value: !Ref UserPoolClient
          - Name: ADMIN_ORIGIN
            Type: PLAINTEXT
            Value: !Sub https://${AdminDistribution.DomainName}
      Source:
        Type: NO_SOURCE
        BuildSpec: |
          version: 0.2
          phases:
            install:
              runtime-versions:
                nodejs: 20
              commands:
                - git clone --depth 1 --branch "$SOURCE_VERSION" "$REPOSITORY_URL" source
                - cd source
                - npm ci
            build:
              commands:
                - cd source
                - npm --workspace packages/shared run build
                - npm --workspace apps/cms-api run build
                - mkdir -p /tmp/cms-api-lambda/packages/shared/dist
                - cp -r apps/cms-api/dist/* /tmp/cms-api-lambda/
                - cp packages/shared/package.json /tmp/cms-api-lambda/packages/shared/package.json
                - cp -r packages/shared/dist/* /tmp/cms-api-lambda/packages/shared/dist/
                - |
                  cat > /tmp/cms-api-lambda/package.json <<'EOF'
                  {
                    "type": "module",
                    "dependencies": {
                      "@aws-sdk/client-codebuild": "^3.1040.0",
                      "@aws-sdk/client-cognito-identity-provider": "^3.1039.0",
                      "@aws-sdk/client-s3": "^3.946.0",
                      "@community-site-engine/shared": "file:packages/shared",
                      "@hono/node-server": "^1.19.6",
                      "hono": "^4.10.6",
                      "mime": "^4.1.0",
                      "zod": "^4.1.12"
                    }
                  }
                  EOF
                - cd /tmp/cms-api-lambda
                - npm install --omit=dev
                - zip -qr /tmp/cms-api-lambda.zip .
                - aws lambda update-function-configuration --function-name "$CMS_API_FUNCTION_NAME" --handler lambda.handler --runtime nodejs22.x
                - aws lambda wait function-updated --function-name "$CMS_API_FUNCTION_NAME"
                - aws lambda update-function-code --function-name "$CMS_API_FUNCTION_NAME" --zip-file fileb:///tmp/cms-api-lambda.zip
                - aws lambda wait function-updated --function-name "$CMS_API_FUNCTION_NAME"
                - cd "$CODEBUILD_SRC_DIR/source"
                - |
                  if ! aws s3 ls "s3://$CMS_CONTENT_BUCKET/" --recursive | head -n 1 | grep -q .; then
                    aws s3 sync examples/site-assets/content "s3://$CMS_CONTENT_BUCKET/" --delete
                  fi
                - aws s3 sync "s3://$CMS_CONTENT_BUCKET/" site-assets/content --delete
                - npm run seed:media
                - VITE_CMS_API_URL="$CMS_API_ENDPOINT" VITE_COGNITO_DOMAIN="$COGNITO_DOMAIN" VITE_COGNITO_CLIENT_ID="$COGNITO_CLIENT_ID" VITE_COGNITO_REDIRECT_URI="$ADMIN_ORIGIN" npm --workspace apps/cms-admin run build
                - aws s3 sync apps/cms-admin/dist "s3://$ADMIN_SITE_BUCKET/" --delete
                - npm run build:site
                - aws s3 sync apps/site/dist "s3://$PUBLIC_SITE_BUCKET/" --delete
            post_build:
              commands:
                - aws cloudfront create-invalidation --distribution-id "$SITE_DISTRIBUTION_ID" --paths "/*"
                - aws cloudfront create-invalidation --distribution-id "$ADMIN_DISTRIBUTION_ID" --paths "/*"
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
      Tags:
        - Key: Name
          Value: !Sub ${SiteName}-build-${AWS::Region}-${AWS::AccountId}

  DeploymentRunnerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${SiteName}-deploy-runner-role-${AWS::Region}-${AWS::AccountId}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: !Sub ${SiteName}-deploy-runner-access-${AWS::Region}-${AWS::AccountId}
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - codebuild:StartBuild
                Resource: !GetAtt StaticSiteBuildProject.Arn

  DeploymentRunnerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${SiteName}-deploy-runner-${AWS::Region}-${AWS::AccountId}
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt DeploymentRunnerRole.Arn
      Timeout: 900
      MemorySize: 256
      Code:
        ZipFile: |
          import boto3
          import json
          import urllib.request

          codebuild = boto3.client("codebuild")

          def respond(event, context, status, data=None, reason=None):
              body = {
                  "Status": status,
                  "Reason": reason or f"See CloudWatch Log Stream: {context.log_stream_name}",
                  "PhysicalResourceId": event.get("PhysicalResourceId") or "deployment-run",
                  "StackId": event["StackId"],
                  "RequestId": event["RequestId"],
                  "LogicalResourceId": event["LogicalResourceId"],
                  "NoEcho": False,
                  "Data": data or {},
              }
              payload = json.dumps(body).encode("utf-8")
              req = urllib.request.Request(event["ResponseURL"], data=payload, method="PUT")
              req.add_header("content-type", "")
              req.add_header("content-length", str(len(payload)))
              urllib.request.urlopen(req, timeout=30)

          def handler(event, context):
              try:
                  if event["RequestType"] == "Delete":
                      respond(event, context, "SUCCESS", {"Skipped": "Delete does not run a build"})
                      return
                  project = event["ResourceProperties"]["ProjectName"]
                  started = codebuild.start_build(projectName=project)["build"]
                  respond(event, context, "SUCCESS", {"BuildId": started["id"], "Status": "STARTED"})
              except Exception as exc:
                  respond(event, context, "FAILED", reason=str(exc))

  InitialDeployment:
    Type: Custom::InitialDeployment
    DependsOn:
      - AssetSeed
      - InitialAdminUser
      - StaticSiteBuildProject
      - HttpApiStage
    Properties:
      ServiceToken: !GetAtt DeploymentRunnerFunction.Arn
      ProjectName: !Ref StaticSiteBuildProject
      RepositoryVersion: main
      AssetsZipProvided: !If [HasAssetsZip, "true", "false"]

Outputs:
  CmsContentBucket:
    Value: !Ref CmsContentBucket
  PublicSiteBucket:
    Value: !Ref PublicSiteBucket
  AdminSiteBucket:
    Value: !Ref AdminSiteBucket
  PublicSiteCloudFrontDomain:
    Value: !GetAtt SiteDistribution.DomainName
  AdminSiteCloudFrontDomain:
    Value: !GetAtt AdminDistribution.DomainName
  ApiEndpoint:
    Value: !GetAtt HttpApi.ApiEndpoint
  CognitoUserPoolId:
    Value: !Ref UserPool
  CognitoAppClientId:
    Value: !Ref UserPoolClient
  CognitoHostedUiDomain:
    Value: !Sub https://${UserPoolDomain}.auth.${AWS::Region}.amazoncognito.com
  CodeBuildProjectName:
    Value: !Ref StaticSiteBuildProject
